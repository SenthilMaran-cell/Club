<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Antigravity Vision | Next-Gen AI Image Generator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Antigravity Vision</h1>
        <p class="subtitle">
          Turn your imagination into high-resolution reality
        </p>
      </header>

      <main>
        <section class="generator-section">
          <div class="input-container">
            <input
              type="text"
              id="promptInput"
              placeholder="Describe something extraordinary..."
              autocomplete="off"
            />
            <button id="generateBtn">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"
                />
                <path d="M5 3v4" />
                <path d="M19 17v4" />
                <path d="M3 5h4" />
                <path d="M17 19h4" />
              </svg>
              Generate
            </button>
          </div>
        </section>

        <section class="result-section" id="resultContainer">
          <!-- Result card will be injected here -->
        </section>

        <section id="historySection" style="display: none">
          <h2 class="history-title">Recent Creations</h2>
          <div class="history-grid" id="historyGrid">
            <!-- History items will be injected here -->
          </div>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
